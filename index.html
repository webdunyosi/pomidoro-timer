<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Kuzatuvchi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#ef4444', // Red 500
                        secondary: '#f87171', // Red 400
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <style>
        /* Maxsus CSS animatsiyalar va stillar */
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #0f172a;
            /* Orqa fonni biroz qizg'ish tusga mosladik */
            background-image: radial-gradient(circle at top right, #3f1222, #0f172a);
        }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Shakl tugmalari uchun silliq animatsiyalar */
        .shape-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }

        /* Belgilangan holat */
        .shape-btn.active {
            background-color: #ef4444; /* Qizil rang */
            border-color: #ef4444;
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.7);
            transform: scale(1.1);
        }

        /* Ikonka animatsiyasi */
        .shape-btn .check-icon {
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s ease;
        }

        .shape-btn.active .check-icon {
            opacity: 1;
            transform: scale(1);
        }

        /* Toast va Taymer animatsiyalari */
        #toast, #break-timer-container {
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
    </style>
</head>
<body class="min-h-screen text-white flex items-center justify-center p-4">

    <!-- Toast (Tabrik xabari) -->
    <div id="toast" class="fixed top-8 left-1/2 transform -translate-x-1/2 translate-y-[-150%] opacity-0 transition-all duration-500 bg-green-500/20 border border-green-500/50 backdrop-blur-md text-white px-6 py-4 rounded-2xl shadow-[0_10px_40px_rgba(0,0,0,0.3)] flex items-center gap-4 z-50 w-max max-w-[90%]">
        <i id="toast-icon" class="fas fa-star text-green-400 text-xl animate-pulse"></i>
        <span id="toast-msg" class="font-medium text-sm sm:text-base tracking-wide"></span>
    </div>

    <!-- Asosiy Konteyner -->
    <main class="glass-panel w-full max-w-md rounded-3xl p-10 shadow-2xl relative overflow-hidden flex flex-col items-center">
        
        <!-- Orqa fondagi qizil yorug'lik effektlari -->
        <div class="absolute -top-20 -left-20 w-64 h-64 bg-primary rounded-full mix-blend-multiply filter blur-[80px] opacity-20 animate-pulse-slow"></div>
        <div class="absolute -bottom-20 -right-20 w-64 h-64 bg-secondary rounded-full mix-blend-multiply filter blur-[80px] opacity-20 animate-pulse-slow" style="animation-delay: 1.5s;"></div>

        <!-- Sarlavha -->
        <h1 class="text-3xl font-bold mb-3 tracking-wide text-gray-100 z-10 text-center">Pomodoro</h1>
        <p class="text-gray-400 font-medium mb-12 z-10 text-center text-sm">Vaqt tugagach, bosqichni belgilang</p>

        <!-- Tanaffus Taymeri (Yashiringan holatda boshlanadi) -->
        <div id="break-timer-container" class="hidden flex-col items-center justify-center mb-8 z-10 transform scale-95 opacity-0">
            <h2 id="timer-title" class="text-xs text-green-400 uppercase tracking-widest mb-1 font-bold">Tanaffus</h2>
            <div id="break-time" class="text-6xl font-light tabular-nums text-white tracking-tighter drop-shadow-lg">05:00</div>
        </div>

        <!-- 4 ta Qizil Shakl (Tugmalar) -->
        <div class="flex items-center justify-center gap-4 sm:gap-6 mb-12 z-10 w-full">
            <button onclick="toggleShape(this)" class="shape-btn w-16 h-16 sm:w-20 sm:h-20 rounded-2xl border-2 border-red-500/30 bg-slate-800/50 flex items-center justify-center focus:outline-none hover:bg-red-500/10 cursor-pointer" aria-label="1-bosqich">
                <i class="fas fa-check text-2xl sm:text-3xl text-white check-icon"></i>
            </button>
            
            <button onclick="toggleShape(this)" class="shape-btn w-16 h-16 sm:w-20 sm:h-20 rounded-2xl border-2 border-red-500/30 bg-slate-800/50 flex items-center justify-center focus:outline-none hover:bg-red-500/10 cursor-pointer" aria-label="2-bosqich">
                <i class="fas fa-check text-2xl sm:text-3xl text-white check-icon"></i>
            </button>
            
            <button onclick="toggleShape(this)" class="shape-btn w-16 h-16 sm:w-20 sm:h-20 rounded-2xl border-2 border-red-500/30 bg-slate-800/50 flex items-center justify-center focus:outline-none hover:bg-red-500/10 cursor-pointer" aria-label="3-bosqich">
                <i class="fas fa-check text-2xl sm:text-3xl text-white check-icon"></i>
            </button>
            
            <button onclick="toggleShape(this)" class="shape-btn w-16 h-16 sm:w-20 sm:h-20 rounded-2xl border-2 border-red-500/30 bg-slate-800/50 flex items-center justify-center focus:outline-none hover:bg-red-500/10 cursor-pointer" aria-label="4-bosqich">
                <i class="fas fa-check text-2xl sm:text-3xl text-white check-icon"></i>
            </button>
        </div>

        <!-- Hisoblagich va Tozalash tugmasi -->
        <div class="z-10 w-full flex flex-col items-center">
            <p id="counter-text" class="text-red-400 font-bold mb-6 tracking-widest uppercase text-sm transition-colors duration-300">Bajarilgan: 0 / 4</p>
            
            <button onclick="resetShapes()" class="px-6 py-3 rounded-xl bg-slate-700/50 hover:bg-slate-600 text-gray-300 transition-all duration-300 hover:-translate-y-1 hover:shadow-lg focus:outline-none active:scale-95 flex items-center gap-2 text-sm font-medium">
                <i class="fas fa-redo-alt"></i> Barchasini tozalash
            </button>
        </div>

    </main>

    <script>
        let timerInterval;
        let timeLeft = 0;

        // Toast xabarni ko'rsatish
        function showToast(message, isBigBreak = false) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');
            const toastIcon = document.getElementById('toast-icon');
            
            toastMsg.textContent = message;
            
            if (isBigBreak) {
                toast.classList.replace('bg-green-500/20', 'bg-indigo-500/20');
                toast.classList.replace('border-green-500/50', 'border-indigo-500/50');
                toastIcon.className = "fas fa-award text-indigo-400 text-2xl animate-bounce";
            } else {
                toast.classList.replace('bg-indigo-500/20', 'bg-green-500/20');
                toast.classList.replace('border-indigo-500/50', 'border-green-500/50');
                toastIcon.className = "fas fa-star text-green-400 text-xl animate-pulse";
            }

            toast.classList.remove('translate-y-[-150%]', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-[-150%]', 'opacity-0');
            }, 5000);
        }

        // Taymerni boshqarish
        function startTimer(minutes) {
            clearInterval(timerInterval);
            timeLeft = minutes * 60;
            
            const timerContainer = document.getElementById('break-timer-container');
            timerContainer.classList.remove('hidden');
            timerContainer.classList.add('flex');
            
            setTimeout(() => {
                timerContainer.classList.remove('scale-95', 'opacity-0');
                timerContainer.classList.add('scale-100', 'opacity-100');
            }, 50);

            updateTimerDisplay();

            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    playBeep();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('break-time').textContent = `${m}:${s}`;
        }

        function stopTimer() {
            clearInterval(timerInterval);
            const timerContainer = document.getElementById('break-timer-container');
            timerContainer.classList.remove('scale-100', 'opacity-100');
            timerContainer.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                timerContainer.classList.add('hidden');
                timerContainer.classList.remove('flex');
            }, 500);
        }

        // Ovozli signal
        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, ctx.currentTime);
                gainNode.gain.setValueAtTime(0, ctx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.05);
                gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.5);
            } catch (e) {}
        }

        // Shaklni bosganda belgilash yoki bekor qilish
        function toggleShape(btn) {
            const isActive = btn.classList.contains('active');
            
            if (!isActive) {
                btn.classList.add('active');
                const activeCount = document.querySelectorAll('.shape-btn.active').length;
                
                if (activeCount < 4) {
                    showToast("Barakalla! Yutuq! 🎉 Endi 5 daqiqa dam oling.", false);
                    document.getElementById('timer-title').textContent = "Qisqa Tanaffus";
                    document.getElementById('timer-title').classList.remove('text-indigo-400');
                    document.getElementById('timer-title').classList.add('text-green-400');
                    startTimer(5);
                } else if (activeCount === 4) {
                    showToast("Qoyilmaqom! 4 ta bosqich tugadi! 1 soatlik katta tanaffus 🏆", true);
                    document.getElementById('timer-title').textContent = "Katta Tanaffus";
                    document.getElementById('timer-title').classList.remove('text-green-400');
                    document.getElementById('timer-title').classList.add('text-indigo-400');
                    startTimer(60);
                }
            } else {
                btn.classList.remove('active');
                stopTimer();
            }
            
            updateCounter();
        }

        // Nechta shakl belgilanganini sanash
        function updateCounter() {
            const activeCount = document.querySelectorAll('.shape-btn.active').length;
            const counterText = document.getElementById('counter-text');
            
            if (activeCount === 4) {
                counterText.textContent = "Barchasi bajarildi 🎉";
                counterText.classList.replace('text-red-400', 'text-green-400');
            } else {
                counterText.textContent = `Bajarilgan: ${activeCount} / 4`;
                counterText.classList.replace('text-green-400', 'text-red-400');
            }
        }

        // Barcha shakllarni tozalash (yangi kunga yoki siklga o'tish uchun)
        function resetShapes() {
            stopTimer();
            const shapes = document.querySelectorAll('.shape-btn');
            shapes.forEach(shape => {
                // Kichik kechikish bilan tozalash effekti
                setTimeout(() => {
                    shape.classList.remove('active');
                }, Math.random() * 200); 
            });
            
            setTimeout(() => {
                updateCounter();
            }, 250);
        }
    </script>
</body>
</html>
